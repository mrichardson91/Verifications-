<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Awareness Demo</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
    }
    .container {
        width: 360px;
        margin: 60px auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,.15);
    }
    input, button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        box-sizing: border-box;
    }
    button {
        background: #0066cc;
        color: white;
        border: none;
        cursor: pointer;
    }
    .notice {
        margin-top: 15px;
        color: #b00020;
        font-size: 14px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Card Verification</h2>

    <input type="text" placeholder="Cardholder Name">
    <input type="text" placeholder="Card Number">
    <input type="text" placeholder="MM/YY">
    <input type="text" placeholder="CVV">

    <button onclick="showTrainingMessage()">
        Verify Card
    </button>

    <div id="result" class="notice"></div>
</div>

 <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
 <input type="text" name="full_name" placeholder="Full Name" required>
 <input type="email" name="email" placeholder="Email Address" required>
 <input type="tel" name="phone" placeholder="Phone Number">
 <button type="submit">Create Account</button>
</form>
<script>
function showTrainingMessage() {
    document.getElementById("result").innerHTML =
        "This was a security awareness exercise. Never enter payment information from an unexpected email or text message. Always verify the website address and contact your bank directly if you are unsure.";
}
</script>

</body>
</html>
